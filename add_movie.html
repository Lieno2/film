<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Film Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <ul class="nav justify-content-center">
        <li class="nav-item">
            <a class="nav-link active" aria-current="page" href="./home.html">Home</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" href="./data.html">Dati</a>
        </li>
        <li class="nav-item">
            <a class="nav-link disabled" aria-disabled="true">Aggiungi Film</a>
        </li>
    </ul>

    <form onsubmit="addFilm(event)">
        <div class="mb-3">
            <label>Nome del film</label>
            <input id="myName" type="text"  aria-describedby="emailHelp" required>
        </div>
        <div>
            <label for="appointment-time">Durata del film</label>
            <input id="amyDuration" type="time" name="appointment-time" required/>
        </div>
        <div></div>
            <label>Data di visione del film</label>
            <input id="myDate" type="date" name="data" required/>
        </div>
    
        <div class="mb-3 form-check">
            <input type="checkbox" class="form-check-input" id="myCheck">
            <label class="form-check-label" for="exampleCheck1">Check me out</label>
        </div>
        <button type="submit" class="btn btn-primary">Submit</button>
    </form>
    <form action="">
        <div>
            <label for="">Inserisci il film da rimuovere</label>
            <input type="text" name="" id="myFilm">
        </div>
        <button id="myBtn1">Rimuovi film</button>
        <button id="myBtn2">Rimuovi tutti i film</button>
    </form>


    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
